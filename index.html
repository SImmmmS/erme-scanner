<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ERme - สแกนสลิป</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>

    <style>
        :root { --primary: #00c300; --bg-color: #f8fafc; --card-bg: #ffffff; --text-main: #1e293b; --text-muted: #64748b; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Kanit', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); display: flex; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 480px; background-color: var(--card-bg); min-height: 100vh; box-shadow: 0 0 20px rgba(0,0,0,0.05); display: flex; flex-direction: column; }
        .header { background-color: var(--primary); color: white; padding: 20px; text-align: center; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; box-shadow: 0 4px 10px rgba(0,195,0,0.2); }
        .header h1 { font-size: 24px; font-weight: 600; }
        .header p { font-size: 14px; opacity: 0.9; }
        .content { padding: 20px; flex: 1; }
        #upload-section { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; border: 2px dashed #cbd5e1; border-radius: 16px; margin-top: 20px; background-color: #f1f5f9; cursor: pointer; transition: all 0.3s ease; }
        #upload-section:hover { border-color: var(--primary); background-color: #f0fdf4; }
        #upload-section i { font-size: 48px; color: var(--primary); margin-bottom: 10px; }
        input[type="file"] { display: none; }
        .btn { display: flex; align-items: center; justify-content: center; width: 100%; padding: 12px; border-radius: 8px; font-size: 16px; font-weight: 500; cursor: pointer; border: none; transition: background-color 0.2s; margin-bottom: 10px; }
        .btn i { margin-right: 8px; }
        .btn-outline { background-color: transparent; border: 1px solid #cbd5e1; color: var(--text-main); }
        .btn-outline:hover { background-color: #f1f5f9; }
        .result-card { background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .result-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f1f5f9; }
        .result-item:last-child { border-bottom: none; }
        .result-label { color: var(--text-muted); font-size: 14px; }
        .result-value { font-weight: 500; text-align: right; }
        .amount-highlight { font-size: 24px; color: var(--primary); font-weight: 600; }
        #raw-data-content { display: none; background: #1e293b; color: #10b981; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 12px; margin-top: 10px; overflow-x: auto; white-space: pre-wrap; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>ERme Scanner</h1>
            <p>ระบบบันทึกบัญชีอัจฉริยะ</p>
        </div>
        <div class="content">
            <!-- ส่วนที่ 1: หน้าจออัปโหลด -->
            <div id="upload-section">
                <i class="bi bi-cloud-arrow-up-fill"></i>
                <h3 style="margin-bottom: 5px;">อัปโหลดสลิป</h3>
                <p style="color: var(--text-muted); font-size: 14px; text-align: center; margin-bottom: 20px;">
                    รองรับสลิปโอนเงินจากทุกธนาคาร
                </p>
                <label for="slip-upload" class="btn" style="background-color: var(--primary); color: white; pointer-events: none;">
                    <i class="bi bi-image"></i> เลือกรูปภาพจากอัลบั้ม
                </label>
                <input type="file" id="slip-upload" accept="image/*">
            </div>

            <!-- ส่วนที่ 2: แสดงสถานะกำลังประมวลผล -->
            <div id="processing-section" style="display: none; text-align: center; padding: 40px 0;">
                <div class="spinner" style="font-size: 40px; color: var(--primary); margin-bottom: 15px;">
                    <i class="bi bi-arrow-repeat" style="display: inline-block; animation: spin 1.5s linear infinite;"></i>
                </div>
                <h3 id="processing-text">กำลังอ่านข้อมูลสลิป...</h3>
                <div style="width: 100%; background: #e2e8f0; border-radius: 10px; height: 8px; margin-top: 15px; overflow: hidden;">
                    <div id="progress-fill" style="width: 0%; background: var(--primary); height: 100%; transition: width 0.3s;"></div>
                </div>
                <style>@keyframes spin { 100% { transform: rotate(360deg); } }</style>
            </div>

            <!-- ส่วนที่ 3: แสดงผลลัพธ์ -->
            <div id="results-section" style="display: none;">
                <div class="result-card" id="slip-result-details"></div>
                <button id="copy-data-btn" class="btn btn-outline"><i class="bi bi-files"></i> คัดลอกข้อมูล</button>
                <div style="margin-top: 20px;">
                    <button id="toggle-raw-data" class="btn btn-outline" style="font-size: 14px; padding: 8px;">
                        <i class="bi bi-chevron-down"></i> <span class="toggle-text">แสดงข้อมูลดิบ (OCR)</span>
                    </button>
                    <div id="raw-data-content"></div>
                </div>
                <button class="btn btn-outline" style="margin-top: 20px;" onclick="location.reload()">
                    <i class="bi bi-arrow-counterclockwise"></i> สแกนรูปใหม่
                </button>
            </div>

            <!-- ส่วนที่ 4: แสดง Error -->
            <div id="error-section" style="display: none; text-align: center; padding: 40px 0;">
                <i class="bi bi-x-circle text-danger" style="font-size: 48px; color: #dc2626;"></i>
                <h3 style="color: #dc2626; margin: 15px 0;">เกิดข้อผิดพลาด</h3>
                <p id="error-message" style="color: var(--text-muted); margin-bottom: 20px;"></p>
                <button class="btn" style="background-color: var(--primary); color: white;" onclick="location.reload()">ลองใหม่อีกครั้ง</button>
            </div>
        </div>
    </div>

    <!-- โหลดสคริปต์ (บังคับเวอร์ชันใหม่สุด) -->
    <script src="ImagePreviewManager.js?v=9999"></script>
    <script src="OCRProcessor.js?v=9999"></script>
    <script src="QRCropSelector.js?v=9999"></script>
    <script src="QRScanner.js?v=9999"></script>
    <script src="SlipParser.js?v=9999"></script>
    <script src="SlipVerifier.js?v=9999"></script>
    <script src="app.js?v=9999"></script> 
</body>
</html>
